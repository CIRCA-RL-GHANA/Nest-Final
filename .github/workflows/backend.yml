# ============================================
# Backend CI/CD Pipeline
# Lint → Test → Deploy NestJS → Hostinger VPS
# No Docker registry: code rsynced to VPS,
# image is built there directly.
# ============================================
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '18'

jobs:
  # ---- Lint & Test ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: promptgenie_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --coverage --forceExit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: promptgenie_test
          DB_SYNCHRONIZE: true
          JWT_SECRET: test-jwt-secret-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-ci-only
          PIN_ENCRYPTION_KEY: test-pin-key-ci-only
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SENDGRID_API_KEY: SG.test
          EMAIL_FROM: test@test.com
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: '+10000000000'

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  # ---- Deploy to Hostinger VPS ----
  deploy:
    name: Deploy → Hostinger VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── SSH setup ─────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "=== Derived public key from secret ==="
          ssh-keygen -y -f ~/.ssh/deploy_key
          echo "=== Key fingerprint ==="
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: SSH connectivity probe (verbose)
        continue-on-error: true
        run: |
          set +e
          ssh -vvv \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.DEPLOY_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o NumberOfPasswordPrompts=0 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'echo CONNECTED_OK; id; hostname; ls -la ~/.ssh/; stat -c "%a %U:%G %n" ~/.ssh ~/.ssh/authorized_keys; head -c 200 ~/.ssh/authorized_keys; echo; grep -Ei "^[^#]*(pubkey|password|permitroot|maxauth|authorizedkeysfile|strictmodes)" /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf 2>/dev/null' \
            2>&1 | tail -120
          echo "=== probe exit $? ==="

      # ── Sync entire repo to VPS (NestJS app + infra at root) ──────────────
      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.log' \
            --exclude='coverage' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o IdentityAgent=none" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/promptgenie/

      # ── Build & restart on VPS ─────────────────────────────────────────────
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          envs: API_DOMAIN,FRONTEND_DOMAIN,SENDGRID_API_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_PHONE_NUMBER,AI_API_KEY
          script: |
            set -euo pipefail
            cd /opt/promptgenie

            # ── Ensure Docker + Compose are installed ────────────────────────
            if ! command -v docker >/dev/null 2>&1; then
              echo "[bootstrap] Installing Docker"
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "[bootstrap] Installing docker compose plugin"
              apt-get update -y && apt-get install -y docker-compose-plugin || true
            fi

            # ── Bootstrap .env on first run (idempotent) ─────────────────────
            if [ ! -f .env ]; then
              echo "[bootstrap] Generating fresh .env with secure random secrets"
              JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')
              JWT_REFRESH_SECRET=$(openssl rand -base64 64 | tr -d '\n')
              DB_PASSWORD=$(openssl rand -base64 32 | tr -d '+/=\n' | head -c 32)
              REDIS_PASSWORD=$(openssl rand -base64 32 | tr -d '+/=\n' | head -c 32)
              PIN_ENCRYPTION_KEY=$(openssl rand -hex 32)
              PIN_ENCRYPTION_IV=$(openssl rand -hex 16)
              ML_MODEL_SIGNING_SECRET=$(openssl rand -hex 32)
              WEBHOOK_SECRET=$(openssl rand -hex 20)
              API_DOMAIN="${API_DOMAIN:-api.genieinprompt.app}"
              FRONTEND_DOMAIN="${FRONTEND_DOMAIN:-genieinprompt.app}"

              cat > .env <<EOF
            NODE_ENV=production
            PORT=3000
            API_PREFIX=api
            API_VERSION=v1
            APP_NAME=promptgenie

            # Database
            DB_HOST=postgres
            DB_PORT=5432
            DB_USERNAME=postgres
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME=promptgenie
            DB_SYNCHRONIZE=false
            DB_LOGGING=false
            DB_SSL=false

            # Redis
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASSWORD=${REDIS_PASSWORD}
            REDIS_DB=0

            # JWT
            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_EXPIRES_IN=30d

            # Security
            BCRYPT_ROUNDS=12
            PIN_ENCRYPTION_KEY=${PIN_ENCRYPTION_KEY}
            PIN_ENCRYPTION_IV=${PIN_ENCRYPTION_IV}
            ML_MODEL_SIGNING_SECRET=${ML_MODEL_SIGNING_SECRET}

            # CORS & Domains
            API_DOMAIN=${API_DOMAIN}
            FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
            CORS_ORIGIN=https://${FRONTEND_DOMAIN},https://www.${FRONTEND_DOMAIN}
            CORS_CREDENTIALS=true

            # Payment Facilitator (configure later)
            PAYMENT_FACILITATOR_PROVIDER=stripe
            PAYMENT_FACILITATOR_SECRET_KEY=sk_live_NOT_CONFIGURED
            PAYMENT_FACILITATOR_WEBHOOK_SECRET=${WEBHOOK_SECRET}
            PAYMENT_FACILITATOR_CURRENCY=USD

            # Optional third-party (populate later via VPS env update)
            SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
            EMAIL_FROM=noreply@${FRONTEND_DOMAIN}
            TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
            TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
            TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
            AI_API_KEY=${AI_API_KEY:-}
            AI_BASE_URL=https://api.openai.com/v1
            AI_MODEL=gpt-4o-mini

            # Logging
            LOG_LEVEL=info
            EOF
              chmod 600 .env
              echo "[bootstrap] .env created ($(wc -l < .env) lines)"
            else
              echo "[bootstrap] .env already exists at $(pwd)/.env"
            fi

            # ── Run the real deploy ──────────────────────────────────────────
            # Clean up any orphan/stale containers from prior aborted runs so
            # 'docker compose up' isn't blocked by "name in use" conflicts.
            docker compose -f /opt/promptgenie/docker-compose.prod.yml down --remove-orphans --timeout 10 || true
            for c in promptgenie-app promptgenie-postgres promptgenie-redis promptgenie-nginx promptgenie-certbot; do
              docker rm -f "$c" 2>/dev/null || true
            done

            bash scripts/deploy.sh deploy

      - name: API smoke test
        run: |
          # Give nginx a moment to register the healthy upstream before probing externally
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
            "https://api.genieinprompt.app/api/v1/health/live")
          echo "Health: HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "::error::Smoke test failed (HTTP $STATUS)"; exit 1; }

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
